<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>{{ config.title }}</title>
    <link rel="stylesheet" href="{{ get_url(path="bulma.css") }}">
    <script type="text/javascript" src="{{ get_url(path="js/bulma.js") }}"></script>

    <script defer id="FontAwesome-script" src="https://use.fontawesome.com/releases/v5.14.0/js/all.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.css"
        integrity="sha384-AfEj0r4/OFrOo5t7NnNe46zW/tFgW6x/bCJG8FqQCEo3+Aro6EYUG4+cU+KJWu/X" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.js"
        integrity="sha384-g7c+Jr9ZivxKLnZTDUhnkOnsh30B4H0rpLUpJ4jAIKs4fnJI+sEnkvrMWph2EDg4"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/contrib/auto-render.min.js"
        integrity="sha384-mll67QQFJfxn0IYznZYonOWZ644AWYC+Pt2cHqMaRhXVrursRwvLnLaebdGIlYNa" crossorigin="anonymous"
        onload="renderMathInElement(document.body);"></script>

</head>

<body class="main">
    <nav class="navbar is-spaced has-shadow is-dark" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item bd-navbar-item" href="/">
                ALEIX ALCACER
            </a>

            <a role="button" class="navbar-burger" data-target="navbarMenu">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>

        <div id="navbarMenu" class="navbar-menu">
            <div class="navbar-end">
                {% for item in config.extra.navbar_items %}
                <a class="navbar-item bd-navbar-item"
                    href="{{ item.url | replace(from='$BASE_URL', to=config.base_url) }}">
                    <span class="icon-text">
                        <span class="icon has-text-light">
                            <i class="fas {{ item.icon }}"></i>
                        </span>
                        <span>{{ item.name }}</span>
                    </span>
                </a>
                {% endfor %}
            </div>

        </div>
    </nav>

    <header>
        <div class='container pt-6 pb-0'>
            {% block header %}
            {% endblock %}
        </div>
    </header>

    <section class='section'>
        <div class='container content'>
            {% block content %}
            {% endblock %}
        </div>
    </section>

    <footer class="footer">
        <div class="content has-text-centered has-text-white">
            <p class="has-text-centered">
                Made with
                <span class="icon is-small has-text-light">
                    <i class="fas fa-heart fa-xs"></i>
                </span>
                love and lots of
                <span class="icon is-small has-text-light">
                    <i class="fas fa-mug-hot"></i>
                </span>
                tea. <br />
                &#169; {{ now() | date(format="%Y") }}. <strong class="has-text-light">{{ config.title }}</strong>.
            </p>
        </div>
    </footer>
</body>

</html>
